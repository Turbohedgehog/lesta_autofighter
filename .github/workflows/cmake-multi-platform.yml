# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com
name: CMake on multiple platforms

on:
  push:
    # branches: [ "main" ]
    tags:
      - 'v*'
    workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    # Grant write permissions to allow creation of GitHub Releases and asset uploads
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org for more detail
      run: ctest --build-config ${{ matrix.build_type }}

    - name: Package build directory
      # Safely package the entire build folder into a zip archive using GitHub's native action
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v4
      with:
        name: lesta_autofighter-${{ matrix.os }}-${{ matrix.c_compiler }}
        path: ${{ steps.strings.outputs.build-output-dir }}
        compression-level: 9 # Максимальное сжатие, чтобы уменьшить вес мусора CMake

    - name: Download Packaged Artifacts for Release
      # Download the created zip file back to the workspace so the release action can see it
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/download-artifact@v4
      with:
        name: lesta_autofighter-${{ matrix.os }}-${{ matrix.c_compiler }}
        path: ${{ github.workspace }}/ready_packages/lesta_autofighter-${{ matrix.os }}-${{ matrix.c_compiler }}

    - name: Zip downloaded directory for Github Releases
      # GitHub actions/download-artifact downloads it as a folder, so we quickly zip it back into a standard file format
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        cd ${{ github.workspace }}/ready_packages
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          powershell -Command "Compress-Archive -Path './lesta_autofighter-${{ matrix.os }}-${{ matrix.c_compiler }}/*' -DestinationPath '${{ github.workspace }}/lesta_autofighter-${{ matrix.os }}-${{ matrix.c_compiler }}.zip'"
        else
          cd lesta_autofighter-${{ matrix.os }}-${{ matrix.c_compiler }}
          zip -r "${{ github.workspace }}/lesta_autofighter-${{ matrix.os }}-${{ matrix.c_compiler }}.zip" .
        fi

    - name: Upload to GitHub Release
      # Publish compiled archives to GitHub Releases only when a tag is pushed
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.workspace }}/lesta_autofighter-*.zip
        token: ${{ secrets.GITHUB_TOKEN }}
